    container_name: empleados-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-system}
      JWT_SECRET: ${JWT_SECRET:-system}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    networks:
      - auth-network

  inventario-service:
