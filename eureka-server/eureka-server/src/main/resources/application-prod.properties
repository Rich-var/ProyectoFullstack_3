# Perfil PROD: despliegue en Railway / Render.
server.port=${PORT:8761}
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.instance.prefer-ip-address=true
# Si Railway/Render expone un hostname publico fijo para este servicio, indicalo aqui
# para que el resto de microservicios puedan registrarse contra el Eureka correcto.
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:}
