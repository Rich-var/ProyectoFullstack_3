# Perfil DOCKER: se activa con SPRING_PROFILES_ACTIVE=docker (ver docker-compose.yml).
# Sobrescribe SOLO lo que cambia respecto a application.yml (perfil local).

# Dentro de Docker Compose, "mysql" es el nombre del servicio/contenedor, no localhost.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/db_categorias?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:system}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway sigue manejando el esquema; Hibernate no crea tablas.
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Clave JWT compartida con AUTH-SERVICE (debe coincidir vía la misma variable de entorno).
jwt.secret=${JWT_SECRET:system}

# Eureka Server dentro de la red de Docker se llama "eureka-server", no localhost.
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
